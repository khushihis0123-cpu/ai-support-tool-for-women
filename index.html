<!DOCTYPE html>
<html>
<head>
    <title>Support Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: repeating-linear-gradient(135deg,
    #fce1f1,
    #fce1f1 10px,
    #f4bdde 10px,
    #f4bdde 12px
);
            padding: 40px;
            text-align: center;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #fffcfe;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h1 {
            color: #c45a8d;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            resize: none;
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            background: #e67ab1;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #d8649f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wellness Support Chat</h1>
        <p>Share how you're feeling and get a gentle supportive response.</p>

        <form action="/submit" method="POST">
            <textarea name="message" placeholder="Type your message here..." required></textarea>
            <br>
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
