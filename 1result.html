<!DOCTYPE html>
<html>
<head>
    <title>Support Chat Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: repeating-linear-gradient(135deg,
    #fce1f1,
    #fce1f1 10px,
    #f4bdde 10px,
    #f4bdde 12px
);
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: #fffcfe;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        h1, h2 {
            color: #c45a8d;
        }

        .bubble {
            padding: 16px;
            border-radius: 14px;
            margin-top: 15px;
            line-height: 1.5;
        }

        .user {
            background: #f9dcec;
        }

        .assistant {
            background: #f3f0ff;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #c45a8d;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Support Chat</h1>

        <h2>Your Message</h2>
        <div class="bubble user">
            {{ user_input }}
        </div>

        <h2>Response</h2>
        <div class="bubble assistant">
            {{ output }}
        </div>

        <a href="/">Ask another question</a>
    </div>
</body>
</html>
