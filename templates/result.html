<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Chat Result</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

        :root {
            --bg-color: #f1f5f9;        /* Softened premium slate gray background */
            --card-bg: #ffffff;
            --primary-clinical: #be185d;
            --primary-light: #fdf2f8;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-md: 0 10px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 10px -6px rgba(15, 23, 42, 0.05);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 720px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 20px;
        }

        .chat-header {
            padding: 28px 32px;
            border-bottom: 1px solid var(--border-color);
            background: var(--card-bg);
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .header-icon {
            background-color: var(--primary-light);
            color: var(--primary-clinical);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }

        .header-text h1 {
            font-size: 22px;
            color: var(--text-main);
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header-text p.subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin: 4px 0 0;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .chat-body {
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            background: #fafafa;
        }

        .message-section {
            display: flex;
            flex-direction: column;
        }

        .message-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .bubble-user {
            background-color: var(--primary-light);
            border-left: 4px solid var(--primary-clinical);
            padding: 18px 22px;
            border-radius: 0 16px 16px 16px;
            font-size: 15px;
            line-height: 1.5;
            color: #831843;
        }

        .response-viewport {
            font-size: 15px;
            line-height: 1.6;
        }

        .triage-alert {
            background-color: #fef2f2 !important;
            border: 1px solid #fee2e2 !important;
            border-left: 4px solid #ef4444 !important;
            border-radius: 16px;
            padding: 24px;
        }

        .triage-alert h3 {
            margin: 0 0 12px 0;
            color: #991b1b;
            font-size: 18px;
            font-weight: 700;
        }

        .action-area {
            padding: 24px 32px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 14px;
        }

        .btn {
            flex: 1;
            padding: 13px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn-continue {
            background-color: #f1f5f9;
            color: #334155;
            border: 1px solid var(--border-color);
        }

        .btn-continue:hover {
            background-color: #e2e8f0;
        }

        .btn-new {
            background-color: var(--primary-clinical);
            color: white;
        }

        .btn-new:hover {
            background-color: #9d174d;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
            </div>
            <div class="header-text">
                <h1>Clinical Care Support</h1>
                <p class="subtitle">Care Evaluation Node</p>
            </div>
        </div>

        <div class="chat-body">
            <div class="message-section">
                <div class="message-label">Your Message</div>
                <div class="bubble-user">
                    {{ user_input }}
                </div>
            </div>

            <div class="message-section">
                <div class="message-label">Clinical Support Response</div>
                <div class="response-viewport">
                    {{ response | safe }}
                </div>
            </div>
        </div>

        <div class="action-area">
            <a href="/" class="btn btn-continue">Continue Discussion</a>
            <a href="/reset" class="btn btn-new">New Consultation</a>
        </div>
    </div>
</body>
</html>
